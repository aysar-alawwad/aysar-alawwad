<svg width="100%" viewBox="0 0 1200 745" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI',sans-serif">

  <!--
    ============================================================
    HOW TO ADD ANOTHER ROW OF SKILLS
    ============================================================
    1. Copy one entire "ROW" block below (up to 4 <g> skill cards).
    2. In the copy, change every translate(x, ROW_Y) to
       translate(x, PREVIOUS_ROW_Y + 220). Next row would be y=740.
    3. Add +0.96 to every animate "begin" value in the copy
       (keeps the cascading stagger going).
    4. Increase the svg viewBox height by 220,
       and move the bottom accent line down by 220 too.
    ============================================================
  -->

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e13"/>
      <stop offset="100%" stop-color="#10161d"/>
    </linearGradient>
    <linearGradient id="baseLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#89CFF0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#89CFF0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#89CFF0" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1a2129"/>
    </pattern>
    <filter id="ringGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="cardShade" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#151b23"/>
      <stop offset="100%" stop-color="#0e131a"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="745" rx="14" fill="url(#bg)"/>
  <rect width="1200" height="745" fill="url(#dots)" opacity="0.45"/>

  <!-- Minimal asymmetric corner marks -->
  <g stroke="#89CFF0" stroke-width="1.5" fill="none" opacity="0.35" stroke-linecap="round">
    <path d="M26,44 L26,24 L46,24"/>
    <path d="M1174,719 L1174,699 L1154,699"/>
  </g>

  <!-- Header -->
  <text x="40" y="42" font-family="'JetBrains Mono','Fira Code',monospace" font-size="12"
        letter-spacing="4" fill="#89CFF0" opacity="0.85">TECH STACK</text>

  <!-- Card template reminder (not rendered, just for your reference):
       rect 250x190 rx16 · ring r=42 circumference=263.89
       monogram text centered in ring · name y=150 · percent y=172 -->

  <!-- ============================================================
       ROW 1  (y = 80)
       ============================================================ -->

  <!-- Python 90% -->
  <g transform="translate(40,80)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.00s" fill="freeze"/>
    <rect width="250" height="190" rx="16" fill="url(#cardShade)" stroke="#89CFF0" stroke-opacity="0.22"/>
    <circle cx="125" cy="78" r="42" fill="none" stroke="#1c2733" stroke-width="6"/>
    <circle cx="125" cy="78" r="42" fill="none" stroke="#89CFF0" stroke-width="6" stroke-linecap="round"
            stroke-dasharray="263.89" stroke-dashoffset="263.89" transform="rotate(-90 125 78)" filter="url(#ringGlow)">
      <animate attributeName="stroke-dashoffset" from="263.89" to="26.39" dur="0.9s" begin="0.15s" fill="freeze"/>
    </circle>
    <text x="125" y="88" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="24" font-weight="700" fill="#89CFF0">Py</text>
    <text x="125" y="150" text-anchor="middle" font-size="16" font-weight="600" fill="#EDF1F5">Python</text>
    <text x="125" y="172" text-anchor="middle" font-size="13" fill="#89CFF0">90%</text>
  </g>

