<svg width="1200" height="195" viewBox="0 0 1200 195" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e13"/>
      <stop offset="100%" stop-color="#10161d"/>
    </linearGradient>
    <linearGradient id="baseLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#89CFF0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#89CFF0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#89CFF0" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1a2129"/>
    </pattern>
  </defs>

  <!-- Background (always visible, no entrance delay) -->
  <rect width="1200" height="195" fill="url(#bg)"/>
  <rect width="1200" height="195" fill="url(#dots)" opacity="0.45"/>

  <!-- Minimal asymmetric corner marks -->
  <g stroke="#89CFF0" stroke-width="1.5" fill="none" opacity="0" stroke-linecap="round">
    <path d="M26,46 L26,26 L46,26"/>
    <path d="M1174,149 L1174,169 L1154,169"/>
    <animate attributeName="opacity" from="0" to="0.35" dur="0.5s" begin="0s" fill="freeze"/>
  </g>

  <!-- Code mark + breathing ring -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.1s" fill="freeze"/>
    <circle cx="103" cy="45" r="18" fill="none" stroke="#89CFF0" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="14;20;14" dur="3s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.05;0.3" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <text x="90" y="52" font-family="'JetBrains Mono','Fira Code',monospace" font-size="20"
          font-weight="600" fill="#89CFF0">&lt;/&gt;</text>
  </g>

  <!-- Eyebrow -->
  <g opacity="0" transform="translate(0,8)">
    <animate attributeName="opacity" from="0" to="0.8" dur="0.5s" begin="0.2s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0,8" to="0,0" dur="0.5s" begin="0.2s" fill="freeze"/>
    <text x="90" y="80" font-family="'JetBrains Mono','Fira Code',monospace" font-size="12"
          letter-spacing="4" fill="#89CFF0">GITHUB PROFILE</text>
  </g>

  <!-- Name -->
  <g opacity="0" transform="translate(0,10)">
    <animate attributeName="opacity" from="0" to="1" dur="0.55s" begin="0.32s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0,10" to="0,0" dur="0.55s" begin="0.32s" fill="freeze"/>
    <text x="90" y="128" font-size="42" font-weight="700" fill="#F3F6F9" letter-spacing="0.3">Aysar S. Alawwad</text>
  </g>

  <!-- Role -->
  <g opacity="0" transform="translate(0,8)">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.48s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0,8" to="0,0" dur="0.5s" begin="0.48s" fill="freeze"/>
    <text x="90" y="156" font-size="18" font-weight="600" fill="#89CFF0">Full-Stack Engineer</text>
  </g>

  <!-- Accent underline beneath role, filling the space the tagline used to occupy -->
  <rect x="90" y="170" width="0" height="3" rx="1.5" fill="#89CFF0" opacity="0.6">
    <animate attributeName="width" from="0" to="110" dur="0.5s" begin="0.62s" fill="freeze"/>
  </rect>

  <!-- Vertical divider -->
  <line x1="835" y1="50" x2="835" y2="176" stroke="#89CFF0" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="0.22" dur="0.5s" begin="0.5s" fill="freeze"/>
  </line>

  <!-- Right column: status -->
  <g opacity="0" transform="translate(6,0)">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.75s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="6,0" to="0,0" dur="0.5s" begin="0.75s" fill="freeze"/>

    <text x="890" y="86" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11"
          letter-spacing="3" fill="#7C8798">STATUS</text>

    <circle cx="866" cy="102" r="4" fill="#89CFF0">
      <animate attributeName="opacity" values="1;0.35;1" dur="2s" begin="1.25s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;5.5;4" dur="2s" begin="1.25s" repeatCount="indefinite"/>
    </circle>
    <circle cx="866" cy="102" r="4" fill="none" stroke="#89CFF0" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="4;12" dur="2s" begin="1.25s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2s" begin="1.25s" repeatCount="indefinite"/>
    </circle>
    <text x="880" y="107" font-size="17" font-weight="500" fill="#F3F6F9">Working @ Acacus Group</text>
  </g>

  <!-- Right column: location -->
  <g opacity="0" transform="translate(6,0)">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.9s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="6,0" to="0,0" dur="0.5s" begin="0.9s" fill="freeze"/>

    <text x="890" y="142" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11"
          letter-spacing="3" fill="#7C8798">LOCATION</text>
    <text x="866" y="164" font-size="17" font-weight="500" fill="#F3F6F9">Amman, Jordan</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="192" width="1200" height="2" fill="url(#baseLine)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.0s" fill="freeze"/>
  </rect>
</svg>
